<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇 - Mini Game Arcade</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .top-bar {
      width: 100%; max-width: 440px;
      display: flex; justify-content: space-between; align-items: center;
      padding: .8rem 1rem;
    }
    .top-bar a { color: #6c5ce7; text-decoration: none; font-weight: 600; }
    .top-bar button {
      background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer;
    }
    .score-bar {
      display: flex; gap: 2rem; justify-content: center;
      padding: .5rem; font-size: 1.1rem;
    }
    .score-bar span { color: #ffd93d; }
    canvas {
      display: block;
      background: #16213e;
      border-radius: 8px;
      margin-top: .5rem;
      max-width: 100%;
    }
    .controls {
      margin-top: 1rem;
      display: grid;
      grid-template-areas: ". up ." "left . right" ". down .";
      gap: .3rem;
    }
    .controls button {
      width: 50px; height: 50px;
      border: none; border-radius: 8px;
      background: #16213e; color: #fff;
      font-size: 1.3rem; cursor: pointer;
    }
    .controls button:active { background: #6c5ce7; }
    .btn-up { grid-area: up; }
    .btn-down { grid-area: down; }
    .btn-left { grid-area: left; }
    .btn-right { grid-area: right; }
    .game-over {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(0,0,0,.85); padding: 2rem; border-radius: 12px;
      text-align: center; display: none;
    }
    .game-over h2 { margin-bottom: 1rem; color: #ff6b6b; }
    .game-over button {
      padding: .5rem 1.5rem; border: none; border-radius: 8px;
      background: #6c5ce7; color: #fff; font-size: 1rem; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="../../">← 返回大厅</a>
    <strong>贪吃蛇</strong>
    <button onclick="resetGame()">🔄</button>
  </div>
  <div class="score-bar">
    得分: <span id="score">0</span>
    &nbsp;&nbsp;最高: <span id="best">0</span>
  </div>
  <div style="position:relative">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div class="game-over" id="game-over">
      <h2>游戏结束!</h2>
      <p>得分: <span id="final-score">0</span></p>
      <br>
      <button onclick="resetGame()">再来一局</button>
    </div>
  </div>
  <div class="controls">
    <button class="btn-up" onclick="setDir(0,-1)">▲</button>
    <button class="btn-left" onclick="setDir(-1,0)">◄</button>
    <button class="btn-right" onclick="setDir(1,0)">►</button>
    <button class="btn-down" onclick="setDir(0,1)">▼</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const SIZE = 20;
    const COLS = canvas.width / SIZE;
    const ROWS = canvas.height / SIZE;

    let snake, food, dir, nextDir, score, best, gameOver, interval;

    best = parseInt(localStorage.getItem('snake-best') || '0');
    document.getElementById('best').textContent = best;

    function resetGame() {
      snake = [{x: 10, y: 10}];
      dir = {x: 1, y: 0};
      nextDir = {x: 1, y: 0};
      score = 0;
      gameOver = false;
      document.getElementById('score').textContent = '0';
      document.getElementById('game-over').style.display = 'none';
      placeFood();
      if (interval) clearInterval(interval);
      interval = setInterval(tick, 120);
    }

    function placeFood() {
      do {
        food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
      } while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    function setDir(x, y) {
      if (x === -dir.x && y === -dir.y) return;
      nextDir = {x, y};
    }

    function tick() {
      if (gameOver) return;
      dir = nextDir;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
          snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver = true;
        clearInterval(interval);
        document.getElementById('final-score').textContent = score;
        document.getElementById('game-over').style.display = 'block';
        if (score > best) {
          best = score;
          localStorage.setItem('snake-best', best);
          document.getElementById('best').textContent = best;
        }
        return;
      }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById('score').textContent = score;
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#6c5ce7';
      snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? '#a29bfe' : '#6c5ce7';
        ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2);
      });

      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(food.x*SIZE+SIZE/2, food.y*SIZE+SIZE/2, SIZE/2-2, 0, Math.PI*2);
      ctx.fill();
    }

    // 键盘控制
    document.addEventListener('keydown', e => {
      switch(e.key) {
        case 'ArrowUp': case 'w': setDir(0,-1); break;
        case 'ArrowDown': case 's': setDir(0,1); break;
        case 'ArrowLeft': case 'a': setDir(-1,0); break;
        case 'ArrowRight': case 'd': setDir(1,0); break;
      }
    });

    // 触屏滑动
    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
      touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    });
    canvas.addEventListener('touchend', e => {
      if (!touchStart) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.abs(dx) > Math.abs(dy)) {
        setDir(dx > 0 ? 1 : -1, 0);
      } else {
        setDir(0, dy > 0 ? 1 : -1);
      }
      touchStart = null;
    });

    resetGame();
  </script>
</body>
</html>
