<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫雷 - Mini Game Arcade</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }
    .top-bar {
      width: 100%; max-width: 500px;
      display: flex; justify-content: space-between; align-items: center;
      padding: .8rem 1rem;
    }
    .top-bar a { color: #6c5ce7; text-decoration: none; font-weight: 600; }
    .top-bar button {
      background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer;
    }
    .status-bar {
      display: flex; gap: 1.5rem; justify-content: center; align-items: center;
      padding: .5rem; font-size: 1.1rem;
    }
    .status-bar .val { color: #ffd93d; font-weight: 700; }
    .difficulty {
      display: flex; gap: .4rem; margin: .5rem 0;
    }
    .difficulty button {
      padding: .3rem .8rem; border-radius: 20px;
      border: 1px solid #6c5ce7; background: transparent;
      color: #6c5ce7; cursor: pointer; font-size: .85rem;
      transition: all .2s;
    }
    .difficulty button.active { background: #6c5ce7; color: #fff; }
    .flag-toggle {
      margin: .5rem 0;
      padding: .4rem 1.2rem; border-radius: 20px;
      border: 2px solid #ff6b6b; background: transparent;
      color: #ff6b6b; cursor: pointer; font-size: 1rem;
      transition: all .2s;
    }
    .flag-toggle.active { background: #ff6b6b; color: #fff; }
    .board {
      display: inline-grid;
      gap: 2px;
      background: #16213e;
      border-radius: 8px;
      padding: 6px;
      margin-top: .5rem;
    }
    .cell {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      font-size: .85rem; font-weight: 700;
      cursor: pointer;
      transition: background .1s;
    }
    .cell.hidden { background: #2d4059; }
    .cell.hidden:hover { background: #3b5278; }
    .cell.revealed { background: #0f3460; }
    .cell.mine { background: #ff6b6b; }
    .cell.flagged::after { content: '🚩'; }
    .cell[data-n="1"] { color: #74b9ff; }
    .cell[data-n="2"] { color: #00b894; }
    .cell[data-n="3"] { color: #ff6b6b; }
    .cell[data-n="4"] { color: #a29bfe; }
    .cell[data-n="5"] { color: #fdcb6e; }
    .cell[data-n="6"] { color: #00cec9; }
    .cell[data-n="7"] { color: #e17055; }
    .cell[data-n="8"] { color: #dfe6e9; }
    .msg {
      margin-top: .8rem; font-size: 1.2rem;
      min-height: 1.8rem; text-align: center;
    }
    .msg.win { color: #00b894; }
    .msg.lose { color: #ff6b6b; }
    @media (max-width: 400px) {
      .cell { width: 26px; height: 26px; font-size: .75rem; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="../../">← 返回大厅</a>
    <strong>扫雷</strong>
    <button onclick="startGame()">🔄</button>
  </div>

  <div class="difficulty" id="diff">
    <button class="active" data-level="easy">初级 9×9</button>
    <button data-level="medium">中级 16×16</button>
    <button data-level="hard">高级 16×30</button>
  </div>

  <div class="status-bar">
    💣 <span class="val" id="mine-count">10</span>
    &nbsp;&nbsp;⏱ <span class="val" id="timer">0</span>s
  </div>

  <button class="flag-toggle" id="flag-btn" onclick="toggleFlagMode()">🚩 插旗模式: 关</button>

  <div class="board" id="board"></div>
  <div class="msg" id="msg"></div>

  <script>
    const LEVELS = {
      easy:   { rows: 9,  cols: 9,  mines: 10 },
      medium: { rows: 16, cols: 16, mines: 40 },
      hard:   { rows: 16, cols: 30, mines: 99 }
    };

    let level = 'easy', grid, revealed, flagged, mineSet;
    let rows, cols, totalMines, gameOver, won, firstClick, flagMode;
    let timerInterval, seconds;

    // 难度选择
    document.getElementById('diff').addEventListener('click', e => {
      if (e.target.tagName !== 'BUTTON') return;
      level = e.target.dataset.level;
      document.querySelectorAll('#diff button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      startGame();
    });

    let flagBtn = document.getElementById('flag-btn');
    function toggleFlagMode() {
      flagMode = !flagMode;
      flagBtn.classList.toggle('active', flagMode);
      flagBtn.textContent = `🚩 插旗模式: ${flagMode ? '开' : '关'}`;
    }

    function startGame() {
      const cfg = LEVELS[level];
      rows = cfg.rows; cols = cfg.cols; totalMines = cfg.mines;
      grid = Array.from({length: rows}, () => Array(cols).fill(0));
      revealed = Array.from({length: rows}, () => Array(cols).fill(false));
      flagged = Array.from({length: rows}, () => Array(cols).fill(false));
      mineSet = new Set();
      gameOver = false; won = false; firstClick = true;
      flagMode = false;
      flagBtn.classList.remove('active');
      flagBtn.textContent = '🚩 插旗模式: 关';
      seconds = 0;
      clearInterval(timerInterval);
      document.getElementById('timer').textContent = '0';
      document.getElementById('mine-count').textContent = totalMines;
      document.getElementById('msg').textContent = '';
      document.getElementById('msg').className = 'msg';
      renderBoard();
    }

    function placeMines(safeR, safeC) {
      let placed = 0;
      while (placed < totalMines) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
        const key = r * cols + c;
        if (mineSet.has(key)) continue;
        mineSet.add(key);
        grid[r][c] = -1;
        placed++;
      }
      // 计算数字
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[r][c] === -1) continue;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              const nr = r+dr, nc = c+dc;
              if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === -1) count++;
            }
          }
          grid[r][c] = count;
        }
      }
    }

    function renderBoard() {
      const board = document.getElementById('board');
      board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      board.innerHTML = '';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.r = r;
          cell.dataset.c = c;
          updateCell(cell, r, c);
          cell.addEventListener('click', () => onCellClick(r, c));
          cell.addEventListener('contextmenu', e => { e.preventDefault(); onFlag(r, c); });
          // 长按插旗（移动端）
          let longPress;
          cell.addEventListener('touchstart', e => {
            longPress = setTimeout(() => { onFlag(r, c); longPress = -1; }, 400);
          });
          cell.addEventListener('touchend', e => {
            if (longPress === -1) { e.preventDefault(); } else { clearTimeout(longPress); }
          });
          board.appendChild(cell);
        }
      }
    }

    function updateCell(cell, r, c) {
      if (revealed[r][c]) {
        cell.classList.remove('hidden', 'flagged');
        cell.classList.add('revealed');
        if (grid[r][c] === -1) {
          cell.classList.add('mine');
          cell.textContent = '💣';
        } else if (grid[r][c] > 0) {
          cell.textContent = grid[r][c];
          cell.dataset.n = grid[r][c];
        } else {
          cell.textContent = '';
        }
      } else if (flagged[r][c]) {
        cell.className = 'cell hidden flagged';
        cell.textContent = '';
      } else {
        cell.className = 'cell hidden';
        cell.textContent = '';
      }
    }

    function getCell(r, c) {
      return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    }

    function onCellClick(r, c) {
      if (gameOver) return;
      if (flagMode) { onFlag(r, c); return; }
      if (flagged[r][c] || revealed[r][c]) return;

      if (firstClick) {
        firstClick = false;
        placeMines(r, c);
        timerInterval = setInterval(() => {
          seconds++;
          document.getElementById('timer').textContent = seconds;
        }, 1000);
      }

      if (grid[r][c] === -1) {
        // 踩雷
        revealAll();
        gameOver = true;
        clearInterval(timerInterval);
        document.getElementById('msg').textContent = '💥 踩到地雷了！';
        document.getElementById('msg').className = 'msg lose';
        return;
      }

      reveal(r, c);
      checkWin();
    }

    function reveal(r, c) {
      if (r < 0 || r >= rows || c < 0 || c >= cols) return;
      if (revealed[r][c] || flagged[r][c]) return;
      revealed[r][c] = true;
      updateCell(getCell(r, c), r, c);
      if (grid[r][c] === 0) {
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++)
            reveal(r+dr, c+dc);
      }
    }

    function onFlag(r, c) {
      if (gameOver || revealed[r][c]) return;
      flagged[r][c] = !flagged[r][c];
      updateCell(getCell(r, c), r, c);
      const flagCount = flagged.flat().filter(Boolean).length;
      document.getElementById('mine-count').textContent = totalMines - flagCount;
    }

    function revealAll() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          revealed[r][c] = true;
          updateCell(getCell(r, c), r, c);
        }
      }
    }

    function checkWin() {
      let unrevealed = 0;
      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          if (!revealed[r][c]) unrevealed++;
      if (unrevealed === totalMines) {
        gameOver = true; won = true;
        clearInterval(timerInterval);
        document.getElementById('msg').textContent = `🎉 恭喜通关！用时 ${seconds} 秒`;
        document.getElementById('msg').className = 'msg win';
        // 自动插旗所有雷
        for (let r = 0; r < rows; r++)
          for (let c = 0; c < cols; c++)
            if (!revealed[r][c]) {
              flagged[r][c] = true;
              updateCell(getCell(r, c), r, c);
            }
        document.getElementById('mine-count').textContent = '0';
      }
    }

    startGame();
  </script>
</body>
</html>
